services:
  - type: web
    name: ultimate-smart-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ultimate-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: ultimate-db
    plan: free
    databaseName: ultimatedb
    user: ultimateuser
